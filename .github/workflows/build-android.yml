name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Init Capacitor
        run: |
          npx cap init "NostraIsla" "com.nostra.isla" --web-dir www

      - name: Add Android platform
        run: npx cap add android

      - name: Copy web assets
        run: npx cap copy android && npx cap sync android

      - name: Fix Kotlin stdlib duplicate classes
        run: |
          echo 'configurations.all {' > /tmp/fix.gradle
          echo '    exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"' >> /tmp/fix.gradle
          echo '    exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"' >> /tmp/fix.gradle
          echo '}' >> /tmp/fix.gradle
          cat /tmp/fix.gradle android/app/build.gradle > /tmp/build.gradle.tmp
          mv /tmp/build.gradle.tmp android/app/build.gradle

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NostraIsla-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
